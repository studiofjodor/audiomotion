<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiovisual Instrument - Stage 1.1</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: sans-serif; }
        
        /* Video und Canvas gespiegelt für eine natürliche Instrumenten-Interaktion */
        #video, #canvas { 
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: cover; 
            transform: scaleX(-1); /* Spiegelung! */
        }
        
        /* Video schwach sichtbar fürs Debugging */
        #video { z-index: 0; opacity: 0.3; display: block; }
        #canvas { z-index: 1; }
        
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #fff; color: #000; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Audiovisual Instrument</h1>
        <p>Erlaube den Kamera-Zugriff. Hebe deine Hand.</p>
        <button id="startButton">Start Experience</button>
    </div>

    <!-- Video ist nun sichtbar, aber transparent -->
    <video id="video"></video>
    <canvas id="canvas"></canvas>

<script>
class StateManager {
    constructor() {
        this.hands = [];
        this.isActive = false;
    }
    updateHands(landmarks) {
        this.hands = landmarks;
    }
}

class AudioController {
    constructor(state) {
        this.state = state;
        
        // FMSynth eignet sich hervorragend für fließende, organische Klänge
        this.synth = new Tone.FMSynth({
            harmonicity: 3,
            modulationIndex: 10,
            oscillator: { type: "sine" },
            modulation: { type: "square" },
            envelope: { attack: 0.2, decay: 0.2, sustain: 0.8, release: 0.8 }
        });
        
        this.filter = new Tone.Filter(2000, "lowpass");
        this.synth.connect(this.filter);
        this.filter.toDestination();
        
        this.isPlaying = false;
        this.currentFreq = null;

        // C-Moll Pentatonik über 2 Oktaven
        this.scale = [
            130.81, // C3
            155.56, // Eb3
            174.61, // F3
            196.00, // G3
            233.08, // Bb3
            261.63, // C4
            311.13, // Eb4
            349.23, // F4
            392.00, // G4
            466.16, // Bb4
            523.25  // C5
        ];
    }

    start() {
        Tone.start();
    }

    update() {
        if (!this.state.isActive) return;

        if (this.state.hands.length > 0) {
            const hand1 = this.state.hands[0];
            const indexFinger = hand1[8]; 

            // Y-Achse auf die Skala mappen (0.0 ist oben/hoch, 1.0 ist unten/tief)
            const normalizedY = Math.max(0, Math.min(1, indexFinger.y));
            const scaleIndex = Math.floor((1.0 - normalizedY) * (this.scale.length - 1));
            const targetFreq = this.scale[scaleIndex];
            
            // X-Achse steuert Filter (heller = weiter rechts im Spiegelbild)
            const filterCutoff = 200 + (indexFinger.x * 5000);

            if (!this.isPlaying) {
                this.synth.triggerAttack(targetFreq);
                this.isPlaying = true;
                this.currentFreq = targetFreq;
            } else if (this.currentFreq !== targetFreq) {
                // Wenn wir eine neue "Zone" betreten, gleite sanft dorthin
                this.synth.frequency.rampTo(targetFreq, 0.1);
                this.currentFreq = targetFreq;
            }
            
            this.filter.frequency.rampTo(filterCutoff, 0.1);
            
        } else {
            if (this.isPlaying) {
                this.synth.triggerRelease();
                this.isPlaying = false;
                this.currentFreq = null;
            }
        }
    }
}

class VisualController {
    constructor(state, canvasElement) {
        this.state = state;
        this.canvas = canvasElement;
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
    }

    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }

    update() {
        // Motion-Blur-Effekt
        this.ctx.fillStyle = 'rgba(17, 17, 17, 0.3)';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        if (!this.state.isActive) return;

        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
        this.ctx.lineWidth = 2;

        this.state.hands.forEach(hand => {
            // Handzentrum
            if (hand[9]) {
                const x = hand[9].x * this.canvas.width;
                const y = hand[9].y * this.canvas.height;
                
                this.ctx.beginPath();
                this.ctx.arc(x, y, 60, 0, Math.PI * 2);
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                this.ctx.fill();
                this.ctx.stroke();
            }

            // Zeigefinger
            if (hand[8]) {
                const ix = hand[8].x * this.canvas.width;
                const iy = hand[8].y * this.canvas.height;
                this.ctx.beginPath();
                this.ctx.arc(ix, iy, 20, 0, Math.PI * 2);
                this.ctx.fillStyle = 'white';
                this.ctx.fill();
                
                // Zeichne eine Linie vom Zeigefinger zum Handzentrum
                if (hand[9]) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(ix, iy);
                    this.ctx.lineTo(hand[9].x * this.canvas.width, hand[9].y * this.canvas.height);
                    this.ctx.stroke();
                }
            }
        });
    }
}

class InputController {
    constructor(state, videoElement) {
        this.state = state;
        this.video = videoElement;
        
        this.handsDetector = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        this.handsDetector.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        
        this.handsDetector.onResults((results) => {
            if (results.multiHandLandmarks) {
                this.state.updateHands(results.multiHandLandmarks);
            } else {
                this.state.updateHands([]);
            }
        });

        this.camera = new Camera(this.video, {
            onFrame: async () => {
                if(this.state.isActive) {
                    await this.handsDetector.send({image: this.video});
                }
            },
            width: 640,
            height: 480
        });
    }

    start() {
        this.camera.start();
    }
}

const state = new StateManager();
const audio = new AudioController(state);
const visuals = new VisualController(state, document.getElementById('canvas'));
const input = new InputController(state, document.getElementById('video'));

function loop() {
    audio.update();
    visuals.update();
    requestAnimationFrame(loop);
}

document.getElementById('startButton').addEventListener('click', () => {
    document.getElementById('ui').style.display = 'none';
    state.isActive = true;
    audio.start();
    input.start();
    loop();
});
</script>
</body>
</html>
